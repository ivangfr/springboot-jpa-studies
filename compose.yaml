services:

  mysql:
    image: 'mysql:9.6.0'
    container_name: 'mysql'
    restart: 'unless-stopped'
    ports:
      - '3306:3306'
    environment:
      - 'MYSQL_ROOT_PASSWORD=secret'
      - 'MYSQL_DATABASE=studiesdb'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "--password=$$MYSQL_ROOT_PASSWORD"]
      interval: 3s
      timeout: 3s
      retries: 5

  postgres:
    image: 'postgres:18.3'
    container_name: 'postgres'
    restart: 'unless-stopped'
    ports:
      - '5432:5432'
    environment:
      - 'POSTGRES_DB=studiesdb'
      - 'POSTGRES_PASSWORD=postgres'
      - 'POSTGRES_USER=postgres'
    # -- enabling logs
    volumes:
      - './postgres/postgresql.conf:/etc/postgresql.conf'
    command: 'postgres -c config_file=/etc/postgresql.conf'
    # --
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres", "-d", "studiesdb" ]
      interval: 3s
      timeout: 3s
      retries: 5
